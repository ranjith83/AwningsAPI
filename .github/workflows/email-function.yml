name: Email Function CI / CD

on:
  push:
    branches: ["**"]
    paths:
      - "AwningsEmailFunction/**"
      - "AwningsEmailFunction.Tests/**"
      - ".github/workflows/email-function.yml"
  pull_request:
    branches: [master]
    paths:
      - "AwningsEmailFunction/**"
      - "AwningsEmailFunction.Tests/**"

jobs:
  # ── Build & Test ─────────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test (.NET 8)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore AwningsEmailFunction/AwningsEmailFunction.csproj

      - name: Build
        run: dotnet build AwningsEmailFunction/AwningsEmailFunction.csproj --no-restore --configuration Release

      - name: Test
        run: >
          dotnet test AwningsEmailFunction.Tests/AwningsEmailFunction.Tests.csproj
          --configuration Release
          --verbosity normal
          --logger "trx;LogFileName=test-results.trx"
          --results-directory ./TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ./TestResults/*.trx

  # ── Deploy to Azure Functions ─────────────────────────────────────────────────
  # Zip Deploy — matches the Visual Studio publish profile.
  #
  # Required secrets:
  #   AZURE_FUNCTIONAPP_NAME        — e.g. func-awnings-email-reader
  #   AZURE_FUNCTIONAPP_PUBLISH_PROFILE — download from Azure Portal → Function App → Get publish profile
  deploy:
    name: Deploy to Azure Functions
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish
        run: >
          dotnet publish AwningsEmailFunction/AwningsEmailFunction.csproj
          --configuration Release
          --output ./publish

      - name: Deploy to Azure Functions
        uses: azure/functions-action@v1
        with:
          app-name: ${{ secrets.AZURE_FUNCTIONAPP_NAME }}
          package: ./publish
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
