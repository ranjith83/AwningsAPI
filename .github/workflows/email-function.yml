name: Email Function CI / CD

on:
  push:
    branches: ["**"]
    paths:
      - "AwningsEmailFunction/**"
      - "AwningsEmailFunction.Tests/**"
      - ".github/workflows/email-function.yml"
  pull_request:
    branches: [master]
    paths:
      - "AwningsEmailFunction/**"
      - "AwningsEmailFunction.Tests/**"

jobs:
  # ── Build & Test ─────────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test (.NET 8)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore AwningsEmailFunction/AwningsEmailFunction.csproj

      - name: Build
        run: dotnet build AwningsEmailFunction/AwningsEmailFunction.csproj --no-restore --configuration Release

      #- name: Test
      #  run: >
      #    dotnet test AwningsEmailFunction.Tests/AwningsEmailFunction.Tests.csproj
      #    --configuration Release
      #    --verbosity normal
      #    --logger "trx;LogFileName=test-results.trx"
      #    --results-directory ./TestResults

      #- name: Upload test results
      #  if: always()
      #  uses: actions/upload-artifact@v4
      #  with:
      #    name: test-results
      #    path: ./TestResults/*.trx

  # ── Deploy to Azure Functions ─────────────────────────────────────────────────
  # Uses OIDC + Azure CLI zip deploy — avoids azure/functions-action Kudu/SCM auth issues.
  #
  # Required secrets:
  #   AZURE_CLIENT_ID       — App Registration → Application (client) ID
  #   AZURE_TENANT_ID       — App Registration → Directory (tenant) ID
  #   AZURE_SUBSCRIPTION_ID — Azure Portal → Subscriptions
  #   AZURE_FUNCTIONAPP_NAME — e.g. func-awnings-email-reader
  #   AZURE_RESOURCE_GROUP  — resource group containing the Function App
  deploy:
    name: Deploy to Azure Functions
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    permissions:
      id-token: write   # required for OIDC token exchange
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish
        run: >
          dotnet publish AwningsEmailFunction/AwningsEmailFunction.csproj
          --configuration Release
          --output ./publish

      - name: Zip publish output
        run: cd ./publish && zip -r ../publish.zip .

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Functions
        env:
          APP_NAME: ${{ secrets.AZURE_FUNCTIONAPP_NAME }}
        run: |
          TOKEN=$(az account get-access-token --resource "https://management.azure.com/" --query accessToken -o tsv)
          curl --fail --show-error -X POST \
            "https://$APP_NAME.scm.azurewebsites.net/api/zipdeploy" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @publish.zip
