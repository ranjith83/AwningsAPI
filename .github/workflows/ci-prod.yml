name: CI/CD – Production
run-name: "${{ github.event.inputs.deployment_note || 'Manual deploy' }} · ${{ github.sha }}"

on:
  workflow_dispatch:
    inputs:
      deployment_note:
        description: 'Deployment note (paste your commit message here)'
        required: false
        default: ''

jobs:
  build-and-test:
    name: Build & Test (.NET 9)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore AwningsAPI/AwningsAPI.csproj

      - name: Build
        run: dotnet build AwningsAPI/AwningsAPI.csproj --no-restore --configuration Release

  deploy-prod:
    name: Deploy to Production Container App
    runs-on: ubuntu-latest
    needs: build-and-test
    environment: production
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for migration changes
        id: check-migrations
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'AwningsAPI/Migrations/*.cs' | grep -v 'Designer' | grep -v 'Snapshot' | wc -l)
          echo "Migration files changed: $CHANGED"
          echo "has_migrations=$( [ "$CHANGED" -gt 0 ] && echo 'true' || echo 'false' )" >> $GITHUB_OUTPUT

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Open SQL firewall for runner
        if: steps.check-migrations.outputs.has_migrations == 'true'
        env:
          RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
          SQL_SERVER: ${{ secrets.AZURE_SQL_SERVER }}
        run: |
          RESOURCE_GROUP=$(echo "$RESOURCE_GROUP" | tr -d '[:space:]')
          SQL_SERVER=$(echo "$SQL_SERVER" | tr -d '[:space:]')
          RUNNER_IP=$(curl -s https://api.ipify.org)
          echo "Runner IP: $RUNNER_IP"
          az sql server firewall-rule create \
            --resource-group "$RESOURCE_GROUP" \
            --server "$SQL_SERVER" \
            --name github-runner \
            --start-ip-address "$RUNNER_IP" \
            --end-ip-address "$RUNNER_IP"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image (production)
        uses: docker/build-push-action@v5
        with:
          context: ${{ github.workspace }}/AwningsAPI
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/awningsapi:latest
            ghcr.io/${{ github.repository_owner }}/awningsapi:${{ github.sha }}

      - name: Setup .NET 9
        if: steps.check-migrations.outputs.has_migrations == 'true'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Install EF Core tools
        if: steps.check-migrations.outputs.has_migrations == 'true'
        run: dotnet tool install --global dotnet-ef

      - name: Restore NuGet packages
        if: steps.check-migrations.outputs.has_migrations == 'true'
        run: dotnet restore AwningsAPI/AwningsAPI.csproj

      - name: Build project
        if: steps.check-migrations.outputs.has_migrations == 'true'
        run: dotnet build AwningsAPI/AwningsAPI.csproj --no-restore

      - name: Record current migration
        id: pre-migrate
        if: steps.check-migrations.outputs.has_migrations == 'true'
        run: |
          LAST=$(dotnet ef migrations list \
            --project AwningsAPI/AwningsAPI.csproj \
            --no-build \
            --connection "${{ secrets.SQL_CONNECTION_STRING }}" \
            2>/dev/null | grep -v "(Pending)" | tail -1 | awk '{print $1}')
          echo "last_migration=${LAST:-0}" >> $GITHUB_OUTPUT

      - name: Run database migrations
        id: migrate
        if: steps.check-migrations.outputs.has_migrations == 'true'
        run: |
          dotnet ef database update \
            --project AwningsAPI/AwningsAPI.csproj \
            --no-build \
            --connection "${{ secrets.SQL_CONNECTION_STRING }}"

      - name: Rollback migration on failure
        if: steps.check-migrations.outputs.has_migrations == 'true' && failure() && steps.migrate.outcome == 'failure'
        run: |
          dotnet ef database update ${{ steps.pre-migrate.outputs.last_migration }} \
            --project AwningsAPI/AwningsAPI.csproj \
            --no-build \
            --connection "${{ secrets.SQL_CONNECTION_STRING }}"

      - name: Remove SQL firewall rule
        if: always() && steps.check-migrations.outputs.has_migrations == 'true'
        env:
          RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
          SQL_SERVER: ${{ secrets.AZURE_SQL_SERVER }}
        run: |
          RESOURCE_GROUP=$(echo "$RESOURCE_GROUP" | tr -d '[:space:]')
          SQL_SERVER=$(echo "$SQL_SERVER" | tr -d '[:space:]')
          az sql server firewall-rule delete \
            --resource-group "$RESOURCE_GROUP" \
            --server "$SQL_SERVER" \
            --name github-runner \
            --yes

      - name: Deploy image to Production Container App
        uses: azure/container-apps-deploy-action@v2
        with:
          containerAppName: ${{ secrets.CONTAINER_APP_NAME }}
          resourceGroup: ${{ secrets.AZURE_RESOURCE_GROUP }}
          imageToDeploy: ghcr.io/${{ github.repository_owner }}/awningsapi:${{ github.sha }}
