name: CI/CD – Dev

on:
  push:
    branches: [master]
    paths:
      - "AwningsAPI/**"
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build & Test (.NET 9)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore AwningsAPI/AwningsAPI.csproj

      - name: Build
        run: dotnet build AwningsAPI/AwningsAPI.csproj --no-restore --configuration Release

  deploy-dev:
    name: Deploy to Dev Container App
    runs-on: ubuntu-latest
    needs: build-and-test
    environment: dev
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image (dev)
        uses: docker/build-push-action@v5
        with:
          context: ${{ github.workspace }}/AwningsAPI
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/awningsapi:dev
            ghcr.io/${{ github.repository_owner }}/awningsapi:dev-${{ github.sha }}

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Install EF Core tools
        run: dotnet tool install --global dotnet-ef

      - name: Open VM NSG port 1433 for runner
        env:
          RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
          NSG_NAME: ${{ secrets.AZURE_VM_NSG_NAME }}
        run: |
          RESOURCE_GROUP=$(echo "$RESOURCE_GROUP" | tr -d '[:space:]')
          NSG_NAME=$(echo "$NSG_NAME" | tr -d '[:space:]')
          RUNNER_IP=$(curl -s https://api.ipify.org)
          if az network nsg rule show \
              --resource-group "$RESOURCE_GROUP" \
              --nsg-name "$NSG_NAME" \
              --name github-runner-sql &>/dev/null; then
            az network nsg rule update \
              --resource-group "$RESOURCE_GROUP" \
              --nsg-name "$NSG_NAME" \
              --name github-runner-sql \
              --source-address-prefixes "$RUNNER_IP"
          else
            az network nsg rule create \
              --resource-group "$RESOURCE_GROUP" \
              --nsg-name "$NSG_NAME" \
              --name github-runner-sql \
              --priority 100 \
              --source-address-prefixes "$RUNNER_IP" \
              --source-port-ranges '*' \
              --destination-address-prefixes '*' \
              --destination-port-ranges 1433 \
              --access Allow \
              --protocol Tcp
          fi

      - name: Record current migration
        id: pre-migrate
        run: |
          LAST=$(dotnet ef migrations list \
            --project AwningsAPI/AwningsAPI.csproj \
            --no-build \
            --connection "${{ secrets.DEV_SQL_CONNECTION_STRING }}" \
            2>/dev/null | grep -v "(Pending)" | tail -1 | awk '{print $1}')
          echo "last_migration=${LAST:-0}" >> $GITHUB_OUTPUT

      - name: Run database migrations
        id: migrate
        run: |
          dotnet ef database update \
            --project AwningsAPI/AwningsAPI.csproj \
            --no-build \
            --connection "${{ secrets.DEV_SQL_CONNECTION_STRING }}"

      - name: Rollback migration on failure
        if: failure() && steps.migrate.outcome == 'failure'
        run: |
          dotnet ef database update ${{ steps.pre-migrate.outputs.last_migration }} \
            --project AwningsAPI/AwningsAPI.csproj \
            --no-build \
            --connection "${{ secrets.DEV_SQL_CONNECTION_STRING }}"

      - name: Remove VM NSG rule
        if: always()
        env:
          RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
          NSG_NAME: ${{ secrets.AZURE_VM_NSG_NAME }}
        run: |
          RESOURCE_GROUP=$(echo "$RESOURCE_GROUP" | tr -d '[:space:]')
          NSG_NAME=$(echo "$NSG_NAME" | tr -d '[:space:]')
          az network nsg rule delete \
            --resource-group "$RESOURCE_GROUP" \
            --nsg-name "$NSG_NAME" \
            --name github-runner-sql

      - name: Deploy image to Dev Container App
        uses: azure/container-apps-deploy-action@v2
        with:
          containerAppName: ${{ secrets.CONTAINER_APP_NAME_DEV }}
          resourceGroup: ${{ secrets.AZURE_RESOURCE_GROUP }}
          imageToDeploy: ghcr.io/${{ github.repository_owner }}/awningsapi:dev-${{ github.sha }}
          registryUrl: ghcr.io
          registryUsername: ${{ github.actor }}
          registryPassword: ${{ secrets.GITHUB_TOKEN }}
