name: CI / CD

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [master]

jobs:
  # ── Build & Test ────────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test (.NET 9)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore AwningsAPI/AwningsAPI.csproj

      - name: Build
        run: dotnet build AwningsAPI/AwningsAPI.csproj --no-restore --configuration Release

      #- name: Test
      #  run: >
      #    dotnet test AwningsAPI/AwningsAPI.sln
      #    --no-build
      #    --configuration Release
      #    --verbosity normal
      #    --logger "trx;LogFileName=test-results.trx"
      #    --collect:"XPlat Code Coverage"
      #    --results-directory ./TestResults

      #- name: Publish test results
      #  uses: dorny/test-reporter@v1
      #  if: always()
      #  with:
      #    name: xUnit Tests
      #    path: TestResults/**/*.trx
      #    reporter: dotnet-trx
      #    fail-on-error: true

      #- name: Upload coverage report
      #  uses: actions/upload-artifact@v4
      #  if: always()
      #  with:
      #    name: coverage-report
      #    path: TestResults/**/coverage.cobertura.xml
      #    retention-days: 14

  # ── Deploy to Azure Container Apps ─────────────────────────────────────────
  # Scoped to AwningsAPI only. AwningsEmailFunction and AwningsAPI.Functions
  # have their own separate deployment pipelines.
  # Builds the Docker image and pushes to GitHub Container Registry (ghcr.io),
  # which is free and uses the built-in GITHUB_TOKEN — no registry secrets needed.
  # Then updates the Container App to use the new image.
  deploy:
    name: Deploy to Azure Container Apps
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ github.workspace }}/AwningsAPI
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/awningsapi:latest
            ghcr.io/${{ github.repository_owner }}/awningsapi:${{ github.sha }}

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Configure registry credentials on Container App
        run: |
          az containerapp registry set \
            --name ${{ secrets.CONTAINER_APP_NAME }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --server ghcr.io \
            --username ${{ github.actor }} \
            --password ${{ secrets.GHCR_PAT }}

      - name: Update Container App image
        run: |
          az containerapp update \
            --name ${{ secrets.CONTAINER_APP_NAME }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --image ghcr.io/${{ github.repository_owner }}/awningsapi:${{ github.sha }}
