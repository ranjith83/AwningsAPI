name: CI / CD

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [master]

jobs:
  # ── Build & Test ────────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test (.NET 9)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore AwningsAPI/AwningsAPI.csproj

      - name: Build
        run: dotnet build AwningsAPI/AwningsAPI.csproj --no-restore --configuration Release

      #- name: Test
      #  run: >
      #    dotnet test AwningsAPI/AwningsAPI.csproj
      #    --no-build
      #    --configuration Release
      #    --verbosity normal
      #    --logger "trx;LogFileName=test-results.trx"
      #    --collect:"XPlat Code Coverage"
      #    --results-directory ./TestResults

  # ── Deploy to Azure Container Apps ─────────────────────────────────────────
  # Scoped to AwningsAPI only. AwningsEmailFunction and AwningsAPI.Functions
  # have their own separate deployment pipelines.
  #
  # Flow:
  #   1. Build Docker image and push to GitHub Container Registry (ghcr.io) — free, no ACR needed.
  #   2. Deploy the pre-built image to Container Apps via azure/container-apps-deploy-action.
  #
  # Required secrets: AZURE_CLIENT_ID, AZURE_CLIENT_SECRET, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID, CONTAINER_APP_NAME, AZURE_RESOURCE_GROUP, GHCR_PAT
  deploy:
    name: Deploy to Azure Container Apps
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ github.workspace }}/AwningsAPI
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/awningsapi:latest
            ghcr.io/${{ github.repository_owner }}/awningsapi:${{ github.sha }}

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy image to Azure Container Apps
        uses: azure/container-apps-deploy-action@v2
        with:
          containerAppName: ${{ secrets.CONTAINER_APP_NAME }}
          resourceGroup: ${{ secrets.AZURE_RESOURCE_GROUP }}
          imageToDeploy: ghcr.io/${{ github.repository_owner }}/awningsapi:${{ github.sha }}
          registryUrl: ghcr.io
          registryUsername: ${{ github.actor }}
          registryPassword: ${{ secrets.GHCR_PAT }}
