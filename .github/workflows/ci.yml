name: CI / CD

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [master]

jobs:
  # ── Build & Test ────────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test (.NET 9)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore AwningsAPI/AwningsAPI.sln

      - name: Build
        run: dotnet build AwningsAPI/AwningsAPI.sln --no-restore --configuration Release

      #- name: Test
      #  run: >
      #    dotnet test AwningsAPI/AwningsAPI.sln
      #    --no-build
      #    --configuration Release
      #    --verbosity normal
      #    --logger "trx;LogFileName=test-results.trx"
      #    --collect:"XPlat Code Coverage"
      #    --results-directory ./TestResults

      #- name: Publish test results
      #  uses: dorny/test-reporter@v1
      #  if: always()
      #  with:
      #    name: xUnit Tests
      #    path: TestResults/**/*.trx
      #    reporter: dotnet-trx
      #    fail-on-error: true

      #- name: Upload coverage report
      #  uses: actions/upload-artifact@v4
      #  if: always()
      #  with:
      #    name: coverage-report
      #    path: TestResults/**/coverage.cobertura.xml
      #    retention-days: 14

  # ── Deploy to Azure Container Apps ─────────────────────────────────────────
  # Runs only on a push to master (not on PRs or other branches).
  # Uses azure/container-apps-deploy-action with appSourcePath — builds directly
  # from the Dockerfile, no container registry setup or secrets required.
  deploy:
    name: Deploy to Azure Container Apps
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}/AwningsAPI
          containerAppName: ${{ secrets.CONTAINER_APP_NAME }}
          resourceGroup: ${{ secrets.AZURE_RESOURCE_GROUP }}
          dockerfilePath: Dockerfile
